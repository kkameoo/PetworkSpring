# ==========================================
# 1. Server Configuration
# ==========================================
server.port=${SERVER_PORT:8080}
spring.application.name=${SPRING_APPLICATION_NAME:petwork}

# ==========================================
# 2. CORS & Frontend
# ==========================================
spring.frontend.url=${FRONTEND_URL:http://localhost:3000}

# ==========================================
# 3. Redis Configuration
# ==========================================
spring.redis.host=${REDIS_HOST:localhost}
spring.redis.port=${REDIS_PORT:6379}

# ==========================================
# 4. File Upload
# ==========================================
# Windows: C:/springboot_img/
# Mac/Linux: /Users/username/uploads/
file.upload-dir=${FILE_UPLOAD_DIR:/tmp/uploads}

spring.servlet.multipart.max-file-size=${MULTIPART_MAX_FILE_SIZE:10MB}
spring.servlet.multipart.max-request-size=${MULTIPART_MAX_REQUEST_SIZE:50MB}

# ==========================================
# 5. Database & MyBatis
# ==========================================
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/petdb?useSSL=false&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

mybatis.mapper-locations=classpath:mybatis/mappers/**/*.xml
mybatis.type-aliases-package=com.himedia.repository.vo
mybatis.configuration.map-underscore-to-camel-case=true

# ==========================================
# 6. Email Configuration (Google SMTP)
# ==========================================
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# ==========================================
# 7. Logging
# ==========================================
logging.level.root=${LOG_LEVEL_ROOT:INFO}
logging.level.com.himedia=${LOG_LEVEL_APP:DEBUG}